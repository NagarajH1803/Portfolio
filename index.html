      opacity: 0;
      transform: translateY(50px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal-element.revealed { opacity: 1; transform: translateY(0); }

    .reveal-left {
      opacity: 0;
      transform: translateX(-50px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal-left.revealed { opacity: 1; transform: translateX(0); }

    .reveal-right {
      opacity: 0;
      transform: translateX(50px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);

    .reveal-right.revealed { opacity: 1; transform: translateX(0); }

      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);

      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(168, 85, 247, 0.4);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.15), 0 8px 32px rgba(0,0,0,0.3);

      box-shadow: 0 0 15px rgba(168, 85, 247, 0.1), inset 0 0 15px rgba(168, 85, 247, 0.05);

    .neon-border:hover {

      pointer-events: none;
    }

    /* ===== STAR PARTICLES ===== */
    .stars-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
    }

    /* ===== MOUSE SPOTLIGHT ===== */
    .mouse-spotlight {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
    }

    /* ===== LOADER ===== */
    .loader-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #050816;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .loader-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-ring {
      width: 56px; height: 56px;
      border: 3px solid rgba(168,85,247,0.15);
      border-top-color: #a855f7;
      border-right-color: #22d3ee;
      border-radius: 50%;
      animation: loaderSpin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    @keyframes loaderSpin { to { transform: rotate(360deg); } }

    /* ===== MOBILE MENU ===== */
    .mobile-menu {
      position: fixed; inset: 0; z-index: 998;
      background: rgba(5, 8, 22, 0.98);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .mobile-menu.open { opacity: 1; visibility: visible; }

    .profile-ring {
      position: relative;

    .profile-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #a855f7, #22d3ee, #3b82f6, #ec4899, #a855f7);
      animation: loaderSpin 4s linear infinite;
      z-index: -1;
    }
    .profile-ring::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #a855f7, #22d3ee, #3b82f6, #ec4899, #a855f7);

      filter: blur(20px);
      opacity: 0.5;
      z-index: -2;

    .skill-progress-bg {
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      height: 6px;

      transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 10px rgba(168,85,247,0.4);

    .tilt-card {

    function useTypingEffect(words, typingSpeed = 90, deletingSpeed = 45, pauseDuration = 2400) {
      const [text, setText] = useState('');
      const [wordIdx, setWordIdx] = useState(0);
      const [isDeleting, setIsDeleting] = useState(false);

      useEffect(() => {
        const w = words[wordIdx];
        let t;
        if (!isDeleting && text === w) {
          t = setTimeout(() => setIsDeleting(true), pauseDuration);
        } else if (isDeleting && text === '') {
          setIsDeleting(false);
          setWordIdx(p => (p + 1) % words.length);
        } else {
          t = setTimeout(
            () => setText(w.substring(0, isDeleting ? text.length - 1 : text.length + 1)),
            isDeleting ? deletingSpeed : typingSpeed
          );
        }
        return () => clearTimeout(t);
      }, [text, wordIdx, isDeleting, words, typingSpeed, deletingSpeed, pauseDuration]);

      return text;
    }

    function useScrollReveal() {
      useEffect(() => {
        const observer = new IntersectionObserver(
          entries => entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
            }
          }),
          { threshold: 0.06, rootMargin: '0px 0px -50px 0px' }
        );
        const targets = document.querySelectorAll('.reveal-element, .reveal-left, .reveal-right, .reveal-scale');
        targets.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);
    }

    function useActiveSection(ids) {
      const [active, setActive] = useState('hero');
      useEffect(() => {
        const observer = new IntersectionObserver(
          entries => entries.forEach(entry => {
            if (entry.isIntersecting) setActive(entry.target.id);
          }),
          { threshold: 0.2, rootMargin: '-80px 0px -40% 0px' }
        );
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, [ids]);
      return active;
    }

    function useAnimatedCounter(target, duration = 2000) {
      const [count, setCount] = useState(0);
      const [started, setStarted] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(
          entries => {
            if (entries[0].isIntersecting && !started) {
              setStarted(true);
            }
          },
          { threshold: 0.5 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [started]);

      useEffect(() => {
        if (!started) return;
        let start = 0;
        const step = Math.ceil(target / (duration / 16));
        const timer = setInterval(() => {
          start += step;
          if (start >= target) {
            setCount(target);
            clearInterval(timer);
          } else {
            setCount(start);
          }
        }, 16);
        return () => clearInterval(timer);
      }, [started, target, duration]);

      return [count, ref];
    }

    function useTilt(ref) {
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        // Ensure the card is visible and ready for tilt
        el.style.willChange = 'transform';
        el.style.transition = 'transform 0.15s ease-out, box-shadow 0.3s ease';
        const handleMove = (e) => {
          const rect = el.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = ((y - centerY) / centerY) * -6;
          const rotateY = ((x - centerX) / centerX) * 6;
          el.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
          el.style.boxShadow = '0 20px 60px rgba(168,85,247,0.15), 0 0 40px rgba(168,85,247,0.08)';
        };
        const handleLeave = () => {
          el.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
          el.style.boxShadow = '';
        };
        el.addEventListener('mousemove', handleMove);
        el.addEventListener('mouseleave', handleLeave);
        return () => {
          el.removeEventListener('mousemove', handleMove);
          el.removeEventListener('mouseleave', handleLeave);
        };
      }, [ref]);
    }

        window.addEventListener('mousemove', handle);
        return () => window.removeEventListener('mousemove', handle);
      }, []);
      return <div ref={ref} className="mouse-spotlight hidden lg:block" />;
    }

      const [activeCategory, setActiveCategory] = useState('Frontend');
      const [animateProgress, setAnimateProgress] = useState(false);
      const sectionRef = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(
          entries => {
            if (entries[0].isIntersecting) setAnimateProgress(true);
          },
          { threshold: 0.2 }
        );
        if (sectionRef.current) observer.observe(sectionRef.current);
        return () => observer.disconnect();
      }, []);

      useEffect(() => {
        setAnimateProgress(false);
        setTimeout(() => setAnimateProgress(true), 100);
      }, [activeCategory]);

      const currentSkills = DATA.skills.find(s => s.category === activeCategory);

            {/* Tech Stack Badges */}

    /* ================================================================

    /* ================================================================
       CONTACT SECTION
       ================================================================ */
    function Contact() {
      const [formData, setFormData] = useState({ name: '', email: '', subject: '', message: '' });
      const [submitted, setSubmitted] = useState(false);
      const handleChange = e => setFormData({ ...formData, [e.target.name]: e.target.value });
      const handleSubmit = e => {
        e.preventDefault();
        setSubmitted(true);
        setTimeout(() => setSubmitted(false), 4000);
        setFormData({ name: '', email: '', subject: '', message: '' });
      };

      return (
        <section id="contact" className="py-28 bg-dark-50 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-96 h-96 bg-purple-500/5 rounded-full blur-[120px] pointer-events-none" />

          <div className="w-full max-w-[1200px] mx-auto px-6 relative z-10">
            <SectionHeader label="Contact" title="Get in Touch" subtitle="Let's build something awesome together" />

            <div className="grid lg:grid-cols-5 gap-12 lg:gap-16">
              {/* Left */}

                <h3 className="text-xl sm:text-2xl font-bold text-white mb-4">Let's Connect</h3>
                <p className="text-gray-400 leading-relaxed mb-8 text-sm font-light">
                  Have a question, an opportunity, or a project in mind? Reach out and I'll get back to you as soon as possible.
                </p>

                <div className="space-y-5">
                  {[
                    { icon: <Icons.Mail className="w-5 h-5 text-purple-400" />, label: 'Email', val: DATA.personal.email, href: `mailto:${DATA.personal.email}` },
                    { icon: <Icons.MapPin className="w-5 h-5 text-cyan-400" />, label: 'Location', val: DATA.personal.location, href: null },
                    { icon: <Icons.Briefcase className="w-5 h-5 text-pink-400" />, label: 'Status', val: DATA.personal.availability, href: null },
                  ].map(item => (
                    <div key={item.label} className="flex items-center gap-4 glass neon-border rounded-xl p-3">
                      <div className="w-11 h-11 rounded-xl bg-white/5 border border-white/5 flex items-center justify-center flex-shrink-0">
                        {item.icon}
                      </div>
                      <div>
                        <p className="text-[10px] font-semibold text-purple-400 uppercase tracking-[2px] font-mono">{item.label}</p>
                        {item.href ? (
                          <a href={item.href} className="text-sm text-gray-200 hover:text-purple-300 font-medium transition-colors">{item.val}</a>
                        ) : (
                          <p className="text-sm text-gray-200 font-medium">{item.val}</p>
                        )}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="flex gap-3 mt-8">
                  {[
                    { icon: Icons.GitHub, url: DATA.social.github, label: 'GitHub' },
                    { icon: Icons.LinkedIn, url: DATA.social.linkedin, label: 'LinkedIn' },
                    { icon: Icons.HackerRank, url: DATA.social.hackerrank, label: 'HackerRank' },
                  ].map(({ icon: I, url, label }) => (
                    <a
                      key={label}
                      href={url}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="w-11 h-11 flex items-center justify-center rounded-xl glass border border-white/10 text-gray-400 hover:text-purple-400 hover:border-purple-500/40 hover:bg-purple-500/10 hover:shadow-[0_0_20px_rgba(168,85,247,0.25)] transition-all duration-300"
                    >
                      <I className="w-5 h-5" />
                    </a>
                  ))}
                </div>
              </div>

              {/* Right — Form */}
              <div className="lg:col-span-3 reveal-right">
                <div className="glass neon-border p-6 sm:p-8 rounded-2xl">
                  {submitted ? (
                    <div className="py-16 text-center">
                      <div className="text-5xl mb-4">{"\u2728"}</div>
                      <h3 className="text-lg font-bold text-white mb-2">Message Sent Successfully!</h3>
                      <p className="text-gray-400 text-sm">Thank you for reaching out. I'll get back to you shortly.</p>
                    </div>
                  ) : (
                    <form onSubmit={handleSubmit} className="space-y-5">
                      <div className="grid sm:grid-cols-2 gap-5">
                        <div>
                          <label className="block text-[10px] font-semibold text-purple-400 uppercase tracking-[2px] font-mono mb-2">Your Name</label>
                          <input
                            type="text" name="name" value={formData.name} onChange={handleChange} required placeholder="John Doe"
                            className="w-full px-4 py-3.5 bg-dark/50 border border-white/10 rounded-xl text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 focus:shadow-[0_0_15px_rgba(168,85,247,0.1)] transition-all duration-300"
                          />
                        </div>
                        <div>
                          <label className="block text-[10px] font-semibold text-purple-400 uppercase tracking-[2px] font-mono mb-2">Email Address</label>
                          <input
                            type="email" name="email" value={formData.email} onChange={handleChange} required placeholder="john@example.com"
                            className="w-full px-4 py-3.5 bg-dark/50 border border-white/10 rounded-xl text-sm text-white placeholder-gray-500 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 focus:shadow-[0_0_15px_rgba(168,85,247,0.1)] transition-all duration-300"
                          />

                      </div>

                      <div>
                        <label className="block text-[10px] font-semibold text-purple-400 uppercase tracking-[2px] font-mono mb-2">Subject</label>

                        />
                      </div>

                      <div>
                        <label className="block text-[10px] font-semibold text-purple-400 uppercase tracking-[2px] font-mono mb-2">Message</label>

                      <button

                        className="btn-primary w-full flex items-center justify-center gap-2 py-4 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-purple-600 via-purple-500 to-indigo-600 shadow-[0_0_20px_rgba(168,85,247,0.35)] hover:shadow-[0_0_30px_rgba(168,85,247,0.5)] transition-all duration-300 cursor-pointer"
                      >
                        <Icons.Send className="w-4 h-4" /> Send Message
                      </button>
                    </form>

                <p className="text-xs text-gray-500 mt-1">&copy; {new Date().getFullYear()} All rights reserved.</p>
              </div>

              <div className="flex gap-3">
                {[
                  { icon: Icons.GitHub, url: DATA.social.github },
                  { icon: Icons.LinkedIn, url: DATA.social.linkedin },
                  { icon: Icons.HackerRank, url: DATA.social.hackerrank },
                ].map(({ icon: I, url }, idx) => (
                  <a
                    key={idx}
                    href={url}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="w-10 h-10 flex items-center justify-center rounded-xl glass border border-white/10 text-gray-400 hover:text-purple-400 hover:border-purple-500/30 hover:shadow-[0_0_15px_rgba(168,85,247,0.2)] transition-all duration-300"
                  >
                    <I className="w-4 h-4" />
                  </a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ================================================================
       SCROLL TO TOP
       ================================================================ */
    function ScrollToTop() {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const handler = () => setVisible(window.scrollY > 500);
        window.addEventListener('scroll', handler);
        return () => window.removeEventListener('scroll', handler);
      }, []);
      return (
        <button
          onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
          className={`fixed bottom-6 right-6 z-50 w-12 h-12 rounded-full bg-gradient-to-r from-purple-600 to-indigo-600 border border-purple-500/20 text-white flex items-center justify-center hover:shadow-[0_0_25px_rgba(168,85,247,0.5)] shadow-[0_0_15px_rgba(168,85,247,0.3)] transition-all duration-300 ${
            visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'
          }`}
          aria-label="Scroll to top"
        >
          <Icons.ChevronUp className="w-5 h-5" />
        </button>
      );
    }

    /* ================================================================
       APP
       ================================================================ */
    function App() {
      useScrollReveal();

      // Re-observe dynamically added elements
      useEffect(() => {
        const timer = setTimeout(() => {
          const observer = new IntersectionObserver(
            entries => entries.forEach(entry => {
              if (entry.isIntersecting) entry.target.classList.add('revealed');
            }),
            { threshold: 0.06 }
          );
          document.querySelectorAll(
            '.reveal-element:not(.revealed), .reveal-left:not(.revealed), .reveal-right:not(.revealed), .reveal-scale:not(.revealed)'
          ).forEach(el => observer.observe(el));
          return () => observer.disconnect();
        }, 300);
        return () => clearTimeout(timer);
      });

      return (
        <>
          <Loader />
          <MouseSpotlight />
          <Navbar />
          <main>
            <Hero />
            <div className="section-divider" />
            <Skills />
            <div className="section-divider" />
            <About />
            <div className="section-divider" />
            <Projects />
            <div className="section-divider" />
            <Education />
            <div className="section-divider" />
            <Certifications />
            <div className="section-divider" />
            <CTA />
            <Contact />
          </main>
          <Footer />
          <ScrollToTop />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
